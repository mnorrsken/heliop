                        - key
                        - name
                        type: object
                      watch:
                        description: watch enables watching the users file for changes.
                        type: boolean
                    required:
                    - usersSecret
                    type: object
                  ldap:
                    description: |-
                      ldap configures the LDAP backend. The bind password is sourced from a
                      Secret, mounted as a file, and referenced via the
                      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE environment variable.
                    properties:
                      additionalGroupsDN:
                        description: additionalGroupsDN is the OU path appended to
                          baseDN for group searches.
                        type: string
                      additionalUsersDN:
                        description: additionalUsersDN is the OU path appended to
                          baseDN for user searches.
                        type: string
                      address:
                        description: address is the LDAP server URL, e.g. "ldap://lldap:3890".
                        type: string
                      attributes:
                        description: |-
                          attributes maps directory attributes, passed through verbatim to
                          authentication_backend.ldap.attributes.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      baseDN:
                        description: baseDN is the base distinguished name container
                          for queries.
                        type: string
                      groupSearchMode:
                        description: groupSearchMode selects the group discovery method
                          (default "filter").
                        type: string
                      groupsFilter:
                        description: groupsFilter is the LDAP filter selecting groups.
                        type: string
                      implementation:
                        description: |-
                          implementation selects the LDAP implementation, e.g. "lldap", "custom" or
                          "activedirectory".
                        type: string
                      passwordSecret:
                        description: passwordSecret references the Secret key holding
                          the bind password.
                        properties:
                          key:
                            description: key is the key within the Secret.
                            type: string
                          name:
                            description: name is the name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      startTLS:
                        description: startTLS enables the StartTLS process on the
                          connection.
                        type: boolean
                      timeout:
                        description: timeout is the connection dial timeout, e.g.
                          "5s".
                        type: string
                      tls:
                        description: |-
                          tls configures TLS verification, passed through verbatim to
                          authentication_backend.ldap.tls.
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      user:
                        description: user is the distinguished name used to bind to
                          the directory.
                        type: string
                      usersFilter:
                        description: usersFilter is the LDAP filter selecting valid
                          users.
                        type: string
                    required:
                    - address
                    - baseDN
                    - passwordSecret
                    - user
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of file or ldap must be set
                  rule: has(self.file) != has(self.ldap)
              config:
                description: |-
                  config is the Authelia configuration.yaml content. The operator injects
                  OIDC clients defined via AutheliaOAuthClient resources into
                  identity_providers.oidc.clients, and merges authenticationBackend (when
                  set) into authentication_backend, before rendering it into a ConfigMap.
                type: string
              deployment:
                description: deployment configures the Authelia Deployment generated
                  by the operator.
                properties:
                  existingSecret:
                    description: |-
                      existingSecret references an existing Secret providing Authelia's core
                      secrets (keys SESSION_ENCRYPTION_KEY, STORAGE_ENCRYPTION_KEY,
                      OIDC_HMAC_SECRET, OIDC_PRIVATE_KEY). It is exposed to the container via
                      envFrom and mounted at /secrets. When unset, the operator generates these
                      secrets into a managed Secret named "<name>-secrets" (generated once and
                      preserved across reconciles).
                    type: string
                  image:
                    default: ghcr.io/authelia/authelia:4
                    description: image is the Authelia container image.
                    type: string
                  imagePullPolicy:
                    default: IfNotPresent
                    description: imagePullPolicy is the image pull policy for the
                      Authelia container.
                    type: string
                  postgresSecretName:
                    description: |-
                      postgresSecretName is the Secret mounted at /pg-secret providing the
                      PostgreSQL password (key: password). When set, the operator mounts it and
                      sets AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE. Unset by default.
                    type: string
                  redisSecretName:
                    description: |-
                      redisSecretName is the Secret mounted at /redis-secret providing the
                      Redis password (key: redis-password). When set, the operator mounts it and
                      sets AUTHELIA_SESSION_REDIS_PASSWORD_FILE. Unset by default.
                    type: string
                  replicas:
                    default: 2
                    description: replicas is the number of Authelia pods to run.
                    format: int32
                    type: integer
                  resources:
                    description: |-
                      resources describes the compute resource requirements for the Authelia
                      container.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  smtpPassword:
                    description: |-
                      smtpPassword, when true, exposes the SMTP password from the core secret
                      (key SMTP_PASSWORD) to Authelia via AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE.
                      Disabled by default.
                    type: boolean
                type: object
            required:
            - config
            type: object
          status:
            description: status defines the observed state of Authelia
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Authelia resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              oidcClients:
                description: |-
                  oidcClients lists the OIDC client IDs currently rendered into the
                  Authelia configuration.
                items:
                  type: string
                type: array
              readyReplicas:
                description: readyReplicas is the number of ready Authelia pods.
                format: int32
                type: integer
            type: object
