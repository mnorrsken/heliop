---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - authelia.snosr.se
  resources:
  - authelia
  - autheliaoauthclients
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - authelia.snosr.se
  resources:
  - authelia/finalizers
  - autheliaoauthclients/finalizers
  verbs:
  - update
- apiGroups:
  - authelia.snosr.se
  resources:
  - authelia/status
  - autheliaoauthclients/status
  verbs:
  - get
  - patch
  - update
