apiVersion: authelia.snosr.se/v1alpha1
kind: Authelia
metadata:
  labels:
    app.kubernetes.io/name: heliop
    app.kubernetes.io/managed-by: kustomize
  name: authelia
  namespace: authelia
spec:
  # Portal FQDN: used for the session cookie authelia_url and Traefik IngressRoute.
  hostname: sso.example.com
  # Generate a Traefik IngressRoute (portal) and a forwardAuth Middleware
  # "authelia-forwardauth". Remove this block if not using Traefik.
  traefik:
    entryPoints:
      - websecure
  deployment:
    replicas: 2
    image: ghcr.io/authelia/authelia:4
    # Core secrets (session, storage encryption, OIDC HMAC + issuer key) are
    # generated into "<name>-secrets" when existingSecret is omitted. Set it to
    # bring your own Secret containing those keys instead:
    # existingSecret: authelia
  # settings holds the verbatim Authelia config plus the Secret references the
  # operator wires into it.
  settings:
    # secrets are mounted by the operator and exposed via the matching
    # AUTHELIA_*_FILE env var; each is named by the last two Authelia config
    # levels. All optional. https://www.authelia.com/configuration/methods/secrets/
    secrets:
      ldapPassword: # authentication_backend.ldap.password
        name: authelia-ldap
        key: password
      postgresPassword: # storage.postgres.password
        name: authelia-db-app
        key: password
      redisPassword: # session.redis.password
        name: redis-ha
        key: redis-password
      smtpPassword: # notifier.smtp.password
        name: authelia-smtp
        key: password
    # fileUsersSecret (file backend) is mounted and set as file.path:
    # fileUsersSecret:
    #   name: authelia-users
    #   key: users_database.yml
    # additionalConfig is the Authelia configuration, verbatim. The operator
    # layers on: OIDC clients (from AutheliaOAuthClient), a default session cookie
    # from hostname when none is set, ldap password stripping, and file.path.
    additionalConfig:
      default_2fa_method: totp
      log:
        level: debug
      server:
        address: tcp://0.0.0.0:9091/
      totp:
        issuer: example.com
      authentication_backend:
        ldap:
          implementation: lldap
          address: ldap://lldap:3890
          base_dn: DC=example,DC=com
          user: UID=read,OU=people,DC=example,DC=com
      session:
        expiration: 1 hour
        redis:
          host: redis
          port: 6379
      storage:
        postgres:
          address: tcp://authelia-db-rw:5432
          database: app
          username: app
      notifier:
        smtp:
          address: smtp.example.com:587
          username: admin@example.com
          sender: admin@example.com
      access_control:
        default_policy: deny
        rules:
          - domain: sso.example.com
            policy: bypass
          - domain: '*.example.com'
            policy: two_factor
      identity_providers:
        oidc:
          claims_policies:
            default:
              id_token: [groups, email, preferred_username, name]
          cors:
            allowed_origins_from_client_redirect_uris: true
