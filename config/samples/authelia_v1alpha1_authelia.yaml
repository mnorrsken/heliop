apiVersion: authelia.snosr.se/v1alpha1
kind: Authelia
metadata:
  labels:
    app.kubernetes.io/name: heliop
    app.kubernetes.io/managed-by: kustomize
  name: authelia
  namespace: authelia
spec:
  # Portal FQDN: used for the session cookie authelia_url and Traefik IngressRoute.
  hostname: sso.example.com
  # Generate a Traefik IngressRoute (portal) and a forwardAuth Middleware
  # "authelia-forwardauth". Remove this block if not using Traefik.
  traefik:
    entryPoints:
      - websecure
  deployment:
    replicas: 2
    image: ghcr.io/authelia/authelia:4
    # Core secrets (session, storage encryption, OIDC HMAC + issuer key) are
    # generated into "<name>-secrets" when existingSecret is omitted. Set it to
    # bring your own Secret containing those keys instead:
    # existingSecret: authelia
    # Postgres, Redis and SMTP password mapping are opt-in. Omit these to run
    # with e.g. sqlite storage, no Redis session store, and no SMTP password.
    postgresSecretName: authelia-db-app
    redisSecretName: redis-ha
    smtpPassword: true
  # First factor backend. config is merged verbatim into authentication_backend;
  # the operator only handles the referenced Secret(s): the LDAP bind password is
  # mounted and exposed via AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE.
  authenticationBackend:
    ldap:
      passwordSecret:
        name: authelia-ldap
        key: password
      config:
        implementation: lldap
        address: ldap://lldap:3890
        base_dn: DC=example,DC=com
        user: UID=read,OU=people,DC=example,DC=com
    # Alternatively, a file backend (mutually exclusive with ldap). usersSecret is
    # mounted and set as file.path; config is merged verbatim:
    # file:
    #   usersSecret:
    #     name: authelia-users
    #     key: users_database.yml
    #   config:
    #     search:
    #       email: true
    #       case_insensitive: true
  # session is merged verbatim into the Authelia "session" config. A default
  # cookie is generated from hostname (authelia_url https://sso.example.com,
  # domain example.com) when no cookies are specified here. The session secret
  # comes from AUTHELIA_SESSION_SECRET_FILE; the Redis password from
  # deployment.redisSecretName.
  session:
    expiration: 1 hour
    redis:
      host: redis
      port: 6379
  # OIDC clients are injected under identity_providers.oidc.clients from
  # AutheliaOAuthClient resources targeting this Authelia.
  config: |
    default_2fa_method: 'totp'
    log:
      level: debug
    server:
      address: 'tcp://0.0.0.0:9091/'
    totp:
      issuer: 'example.com'
    storage:
      postgres:
        address: 'tcp://authelia-db-rw:5432'
        database: 'app'
        username: 'app'
    notifier:
      smtp:
        address: 'smtp.example.com:587'
        username: 'admin@example.com'
        sender: 'admin@example.com'
    access_control:
      default_policy: deny
      rules:
        - domain: 'sso.example.com'
          policy: bypass
        - domain: '*.example.com'
          policy: two_factor
    identity_providers:
      oidc:
        claims_policies:
          default:
            id_token: ['groups', 'email', 'preferred_username', 'name']
        cors:
          allowed_origins_from_client_redirect_uris: true
