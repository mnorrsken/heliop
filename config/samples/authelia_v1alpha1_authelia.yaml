apiVersion: authelia.snosr.se/v1alpha1
kind: Authelia
metadata:
  labels:
    app.kubernetes.io/name: heliop
    app.kubernetes.io/managed-by: kustomize
  name: authelia
  namespace: authelia
spec:
  deployment:
    replicas: 2
    image: ghcr.io/authelia/authelia:4
    secretName: authelia
    postgresSecretName: authelia-db-app
    redisSecretName: redis-ha
  # First factor backend. The operator renders this into authentication_backend
  # and mounts the referenced Secret(s). The LDAP bind password is mounted as a
  # file and exposed via AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE.
  authenticationBackend:
    ldap:
      implementation: lldap
      address: ldap://lldap:3890
      baseDN: DC=example,DC=com
      user: UID=read,OU=people,DC=example,DC=com
      passwordSecret:
        name: authelia-ldap
        key: password
    # Alternatively, a file backend sourced from a Secret (mutually exclusive
    # with ldap). The key is mounted as a file and used as file.path:
    # file:
    #   usersSecret:
    #     name: authelia-users
    #     key: users_database.yml
    #   search:
    #     email: true
    #     caseInsensitive: true
  # OIDC clients are injected under identity_providers.oidc.clients from
  # AutheliaOAuthClient resources targeting this Authelia.
  config: |
    default_2fa_method: 'totp'
    log:
      level: debug
    server:
      address: 'tcp://0.0.0.0:9091/'
    totp:
      issuer: 'example.com'
    session:
      name: 'authelia_session'
      cookies:
        - domain: 'example.com'
          authelia_url: 'https://sso.example.com'
          default_redirection_url: 'https://www.example.com'
      redis:
        host: redis
        port: 6379
    storage:
      postgres:
        address: 'tcp://authelia-db-rw:5432'
        database: 'app'
        username: 'app'
    notifier:
      smtp:
        address: 'smtp.example.com:587'
        username: 'admin@example.com'
        sender: 'admin@example.com'
    access_control:
      default_policy: deny
      rules:
        - domain: 'sso.example.com'
          policy: bypass
        - domain: '*.example.com'
          policy: two_factor
    identity_providers:
      oidc:
        claims_policies:
          default:
            id_token: ['groups', 'email', 'preferred_username', 'name']
        cors:
          allowed_origins_from_client_redirect_uris: true
